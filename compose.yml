services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      sh -lc "pnpm install --frozen-lockfile &&
      pnpm db:migrate &&
      pnpm db:seed &&
      pnpm dev:web"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SENTRY_DISABLED: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: postgres://diffmint:diffmint@postgres:5432/diffmint
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health/ready').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
      - root-node-modules:/workspace/node_modules
      - web-node-modules:/workspace/apps/web/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: diffmint
      POSTGRES_USER: diffmint
      POSTGRES_PASSWORD: diffmint
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diffmint -d diffmint"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  pnpm-store:
  root-node-modules:
  web-node-modules:
  postgres-data:
